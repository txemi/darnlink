name: ci

on:
  push:
  pull_request:

jobs:
  # Tests across every supported Python (pyproject requires-python = ">=3.10"),
  # on Linux AND Windows — Windows-authored files (BOM, CRLF, path separators) are
  # exactly where this kind of tool breaks, so we run the suite there too.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the project (dev extras)
        run: uv pip install -e ".[dev]"
      - name: Run tests
        run: uv run pytest -q
      - name: darnlink self-check (links must be clean)
        run: uv run darnlink .
      - name: darnlink strict self-check (fail-closed — every anchorable link must be robust)
        run: uv run darnlink . --robustify

  # Exercises the commands users actually run (packaging + entry point + the literal README
  # one-liner) on Linux AND Windows — so the copy-paste one-liner is proven on both.
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Packaged build via uvx (no dev deps)
        run: uvx --from . darnlink .
      - name: The exact README one-liner, end-to-end over git (pinned to this commit)
        run: uvx --from git+https://github.com/txemi/darnlink.git@${{ github.sha }} darnlink .
